050-o01"],"sourceAnswer":"对","explanation":"暂无解析"}],"guides":{"intro-q001":{"keywords":"探索中国特色社会主义道路、规律性认识、最大法宝","whyCorrect":"“两个结合”概括了马克思主义基本原理同中国具体实际、同中华优秀传统文化相结合，是党探索中国特色社会主义道路所得的规律性认识，教材把它明确称为取得成功的最大法宝。","distractorTrap":"A是中国特色社会主义最本质特征和根本保证；C是世界观方法论；D是新时代成就变革的决定性因素。三者地位都重要，但不对应“探索道路所得的规律性认识”。","quickMethod":"见“探索道路+规律性认识+最大法宝”，锁定“结合”；不是问领导保证，也不是问方法论。"},"intro-q002":{"keywords":"决定性因素、最大确定性、最大底气、最大保证","whyCorrect":"题干这一整组评价专门对应“两个确立”：确立习近平同志党中央的核心、全党的核心地位，确立习近平新时代中国特色社会主义思想的指导地位。","distractorTrap":"“四个意识”是政治意识要求，“两个维护”是实践要求，“四个自信”是道路理论制度文化自信；都与政治建设相关，但没有被表述为新时代成就变革的决定性因素。","quickMethod":"“决定性因素”直接找“确立”；“维护”是行动，“意识/自信”是要求和信念。"},"intro-q003":{"keywords":"习近平新时代中国特色社会主义思想、马克思主义中国化时代化","whyCorrect":"标准表述是实现了马克思主义中国化时代化“新的飞跃”。“新”强调这一思想在新时代作出的原创性发展。","distractorTrap":"“第二次飞跃”通常用于毛泽东思想相关历史概括；“历史性飞跃”“伟大飞跃”不是本题教材固定称谓。","quickMethod":"看到新时代思想与“中国化时代化”连用，选带“新的”而非给飞跃编号。"},"intro-q004":{"keywords":"十四个坚持、位居第一","whyCorrect":"“十四个坚持”的第一条是坚持党对一切工作的领导，体现党是最高政治领导力量。","distractorTrap":"以人民为中心、新发展理念、全面从严治党都属于基本方略的重要内容，但不在首位。","quickMethod":"十四方略先定领导：问“第一”就选党对一切工作的领导。"},"intro-q005":{"keywords":"战略布局","whyCorrect":"新时代中国特色社会主义事业的战略布局是“四个全面”。它以全面建设社会主义现代化国家为战略目标，配套全面深化改革、全面依法治国、全面从严治党。","distractorTrap":"二、三、五个全面均不是正式概括；“五位一体”是总体布局，不能因数字五而混入战略布局。","quickMethod":"总体布局看五位，战略布局看四全。"},"intro-q006":{"keywords":"确立为党的指导思想、写入党章","whyCorrect":"党的十九大把习近平新时代中国特色社会主义思想确立为党的指导思想并写入党章。","distractorTrap":"十八大在这一思想形成和新时代实践中重要，但尚未以该名称写入党章；十七大和十二大时间更早。载入国家宪法则是2018年全国人大会议，不是本题动作。","quickMethod":"把动作绑定：十九大进党章，2018进宪法。"},"intro-q007":{"keywords":"宪法修正案、载入宪法","whyCorrect":"2018年十三届全国人大一次会议通过宪法修正案，把习近平新时代中国特色社会主义思想载入宪法。","distractorTrap":"其余选项都是相邻年份或届次，但没有完成这一宪法动作；尤其不要把2023年十四届全国人大一次会议与2018年修宪混淆。","quickMethod":"宪法动作只认“2018+十三届人大一次”。"},"intro-q008":{"keywords":"主体内容、主要观点和基本精神、四梁八柱、统摄","whyCorrect":"“十个明确”集中回答新时代坚持和发展中国特色社会主义的一系列基本理论问题，是思想体系的主体内容和四梁八柱。","distractorTrap":"“十四个坚持”偏基本方略和实践要求；“六个必须坚持”是世界观方法论；“十三个方面成就”是新时代实践成就总结。","quickMethod":"理论主体与四梁八柱选“十明确”；方法选六、方略选十四、成就选十三。"},"intro-q009":{"keywords":"相互联系、彼此支撑、辩证唯物主义普遍联系","whyCorrect":"“坚持系统观念”要求从事物的普遍联系和整体系统出发观察处理问题，和题干给出的哲学原理完全同槽。","distractorTrap":"人民至上是根本价值立场，胸怀天下体现世界眼光，敢于斗争强调精神品格；都不是普遍联系原理对应的方法。","quickMethod":"题干出现联系、支撑、整体，直接定位系统观念。"},"intro-q010":{"keywords":"总体布局","whyCorrect":"“五位一体”总体布局统筹经济、政治、文化、社会、生态文明建设五个领域。","distractorTrap":"三、四、六位一体都不是正式表述；最易混的是“四个全面”，但它属于战略布局。","quickMethod":"问总体看建设领域，共五位；问战略看攻坚任务，共四全。"},"intro-q011":{"keywords":"六个必须坚持、列举补全","whyCorrect":"完整六项是人民至上、自信自立、守正创新、问题导向、系统观念、胸怀天下，因此A、B、C均应选。","distractorTrap":"“敢于斗争”是新时代重要要求和精神品格，但不在“六个必须坚持”的固定清单中。这是典型的“真话但不属于本组”。","quickMethod":"按固定六项核对：人、自、守、问、系、胸；看不到“斗”。"},"intro-q012":{"keywords":"马克思主义___、历史主动精神、政治智慧、理论勇气","whyCorrect":"标准并列是马克思主义政治家、思想家、战略家，分别对应把握方向、创立理论和谋划全局。","distractorTrap":"习近平也是中央军委主席，但“军事家”不在题干引用的这一固定三项评价中，不能因身份事实而加选。","quickMethod":"本题是固定“三家”：政治、思想、战略；不按人物身份自由扩展。"},"intro-q013":{"keywords":"主要创立者、创立和发展","whyCorrect":"教材用两个“决定性”评价习近平的贡献：发挥了决定性作用，作出了决定性贡献，所以选A、D。","distractorTrap":"“关键作用”“重大贡献”语义并非负面，但都把教材的“决定性”降了一级，属于程度词降格。","quickMethod":"题干强调主要创立者，两个槽都选最高层级“决定性”。"},"intro-q014":{"keywords":"回答了、重大时代课题","whyCorrect":"三大时代课题分别围绕中国特色社会主义、社会主义现代化强国、长期执政的马克思主义政党，A、B、C构成完整固定组合。","distractorTrap":"D“建设美好世界”方向上容易显得正确，但不是该思想概括的三大时代课题原句，且缺少固定的理论对象和规范表述。","quickMethod":"三问对应路、国、党：中特怎么发展，强国怎么建设，长期执政党怎么建设。"},"intro-q015":{"keywords":"创立背景","whyCorrect":"世界大变局、民族复兴关键期、中国式现代化推进拓展、科学社会主义在中国焕发生机，分别构成国际、民族、实践和理论背景，四项均符合。","distractorTrap":"本题四项不是互斥关系，也没有范围越界；不要因多选常见“三选”习惯删掉第四项。","quickMethod":"背景覆盖外部世界、复兴任务、现代化实践、社会主义理论四个层面，全选。"},"intro-q016":{"keywords":"内在贯通、有机统一、科学体系","whyCorrect":"六个必须坚持、十个明确、十四个坚持、十三个方面成就分别提供方法论、理论内容、实践方略和成就总结，共同构成科学体系。","distractorTrap":"四组选项承担不同功能，不是相互替代，也没有任何一项游离于体系之外。","quickMethod":"问“共同构成科学体系”就是四块拼图全选；若问主体内容才单锁十明确。"},"intro-q017":{"keywords":"三大规律","whyCorrect":"三大规律固定指共产党执政规律、社会主义建设规律、人类社会发展规律。","distractorTrap":"市场经济运行当然有规律，但它不是这里所称马克思主义理论创新的“三大规律”之一。","quickMethod":"三大规律按主体递进：党执政、社会建设、人类发展；不含具体经济运行。"},"intro-q018":{"keywords":"两个结合、马克思主义基本原理同___结合","whyCorrect":"两个结合是同中国具体实际相结合、同中华优秀传统文化相结合，分别解决立足现实与扎根文化的问题。","distractorTrap":"“中国最大实际”不是规范表述，容易借“最大国情”概念混入；和平发展时代主题也不是两个结合的对象。","quickMethod":"一现实一文化：具体实际+优秀传统文化。"},"intro-q019":{"keywords":"两个大局、相互交织","whyCorrect":"两个大局是一内一外：中华民族伟大复兴战略全局与世界百年未有之大变局。","distractorTrap":"对外开放和和平发展都是重要议题，但不是“两个大局”的固定名称，也没有“战略全局/百年变局”的对应结构。","quickMethod":"外部找“百年变局”，内部找“复兴全局”。"},"intro-q020":{"keywords":"习近平新时代中国特色社会主义思想，是","whyCorrect":"其规范定位包括当代中国马克思主义、二十一世纪马克思主义，中华文化和中国精神的时代精华，以及实现民族复兴的行动指南，故选A、B、D。","distractorTrap":"C错在“主体部分”。该思想是中国特色社会主义理论体系的重要组成部分并实现新发展，不能把整个理论体系的结构任意改称“主体部分”。","quickMethod":"选三类定位：时代马克思主义、中华时代精华、复兴行动指南；排除擅改体系层级的“主体部分”。"},"intro-q021":{"keywords":"最现实、最鲜活、中国化时代化马克思主义","whyCorrect":"这一表述强调新时代思想立足当代中国实践、回应现实课题，正是当前中国化时代化马克思主义的鲜活形态，因此判对。","distractorTrap":"句中“最”不是无依据拔高，而是教材固定评价，不能套用“绝对词一律错”的机械规则。","quickMethod":"绝对词先核固定表述；“最现实、最鲜活”在这里成对出现，是原有定位。"},"intro-q022":{"keywords":"两个确立、第二个确立对象","whyCorrect":"第二个确立应是确立习近平新时代中国特色社会主义思想的指导地位，题干却换成范围更大的“中国特色社会主义理论体系”，所以判错。","distractorTrap":"前半句确立核心地位正确，正是用半真半假的结构掩护后半句主体偷换。","quickMethod":"两个确立逐半核对：人是习近平核心，思想是习近平新时代思想；第二半换大范围即错。"},"intro-q023":{"keywords":"整体而非局部、系统而非零散","whyCorrect":"习近平新时代中国特色社会主义思想在各领域提出一系列原创性成果，对马克思主义作出整体性、系统性丰富发展，题干对举关系正确。","distractorTrap":"句中“零散的的”是文本重复字，不改变命题含义；不能把录入瑕疵误作知识错误。","quickMethod":"抓实质对举：整体/系统对应完整理论体系，判对。"},"intro-q024":{"keywords":"思想武器、重要遵循","whyCorrect":"网站判错的关键是定位被降格。标准定位强调它是行动指南和根本遵循，题干改为“思想武器、重要遵循”，没有保留规范层级。","distractorTrap":"句子政治方向完全正面，容易凭语感判对；真正错误不在方向，而在“重要”替代“根本”等固定称谓错位。","quickMethod":"遇到全句都顺的判断题，专查层级词；“重要遵循”不等于标准的“根本遵循”。"},"intro-q025":{"keywords":"十三个方面成就、科学总结、全景式展示","whyCorrect":"“十三个方面成就”正是对新时代各领域实践成就的系统总结，并全景展示理论与实践成果，因此判对。","distractorTrap":"不要与“十个明确”的理论主体内容或“十四个坚持”的基本方略混位；本句始终在讲成就和实践。","quickMethod":"出现“成就+实践总结+全景展示”，功能完全一致，判对。"},"intro-q026":{"keywords":"21世纪科学社会主义、旗帜、中流砥柱","whyCorrect":"中国特色社会主义的成功实践使科学社会主义在21世纪焕发活力，标准表述正是发展旗帜和振兴世界社会主义的中流砥柱，判对。","distractorTrap":"这里的宏大程度词属于教材评价，不是把中国模式强加给所有国家，也没有越界成“唯一模式”。","quickMethod":"区分“旗帜/中流砥柱”的理论影响与“照搬模式”；本句只讲前者，判对。"},"intro-q027":{"keywords":"十个明确、理论品格和鲜明特征","whyCorrect":"网站判错，因为“理论品格和鲜明特征”主要由“六个必须坚持”所彰显；“十个明确”承担主体理论内容功能。","distractorTrap":"两个概念都属于同一思想体系，正因都正确才容易串位。错误是功能分工互换，不是“十个明确”本身错误。","quickMethod":"十明确回答“讲了什么”，六坚持回答“用什么立场方法、体现何种品格”。"},"intro-q028":{"keywords":"独特文化传统、历史命运、基本国情、时代背景、自己的现代化道路","whyCorrect":"四种独特条件共同决定现代化道路必须符合中国特点，不能照搬他国模式，逻辑和标准表述一致，判对。","distractorTrap":"“必然”在这里由四项具体条件支撑，不是无条件绝对化。","quickMethod":"条件全是中国独特性，结论是走适合自己的路，因果吻合。"},"intro-q029":{"keywords":"十八大后、由习近平同志创立","whyCorrect":"网站判错在“由习近平同志创立”把集体智慧和实践来源缩成个人独创。习近平是主要创立者并发挥决定性作用，但思想也是党和人民实践经验与集体智慧的结晶。","distractorTrap":"“十八大后形成发展”具有迷惑性，前半时间大体顺畅，后半用“由一人创立”完成范围缩小。","quickMethod":"主要创立者不等于个人独创；看到“由某一人创立”要查是否抹去党和人民。"},"intro-q030":{"keywords":"境界格局、追求人类进步和解放","whyCorrect":"网站判错，因为这组评价对应“坚持胸怀天下”，而题干把主体偷换成“坚持共同富裕”。共同富裕主要体现人民立场和社会主义本质要求。","distractorTrap":"共同富裕本身当然正确且重要，干扰利用了价值方向一致；但“人类进步和解放、境界格局”已把范围推向天下胸怀。","quickMethod":"人民共同富裕看国内民生；人类进步解放看世界胸怀。范围一扩大到全人类，就选胸怀天下。"},"chapter-1-q001":{"keywords":"新时代、社会主要矛盾","whyCorrect":"新时代主要矛盾固定表述是人民日益增长的美好生活需要和不平衡不充分的发展之间的矛盾。","distractorTrap":"D是改革开放前常用的旧表述；B对应社会主义改造前后的历史矛盾；C不是我国社会主要矛盾。","quickMethod":"新矛盾两端锁定“美好生活需要”和“不平衡不充分”。"},"chapter-1-q002":{"keywords":"鲜明政治品格、理论指导、根本所在","whyCorrect":"马克思主义科学理论指导使党能坚定信仰、把握历史主动，正对应题干的理论根源。","distractorTrap":"文化传承、领导核心、人民军队都重要，但分别是文化、组织和武装条件，不是这里的科学理论指导。","quickMethod":"题干同时出现信仰信念与历史主动，优先找科学理论。"},"chapter-1-q003":{"keywords":"主要矛盾变化、解决主要问题、根本___","whyCorrect":"主要矛盾揭示工作的主攻方向，因此明确的是解决问题的根本着力点。","distractorTrap":"指向、途径、保证都是常见高位词，却不表达把力量落在哪里；本题问的是发力位置。","quickMethod":"“解决问题往哪里用力”对应着力点。"},"chapter-1-q004":{"keywords":"中国特色社会主义道路","whyCorrect":"道路回答“怎样实现”，所以定位为实现途径。","distractorTrap":"理论体系是行动指南，制度是根本保障，文化是精神力量或根本指向相关价值支撑；选项把四位一体功能串位。","quickMethod":"道路就是走法，功能选实现途径。"},"chapter-1-q005":{"keywords":"精神力量","whyCorrect":"文化提供共同价值、精神纽带和精神动力，因此中国特色社会主义文化是精神力量。","distractorTrap":"道路、理论、制度分别承担途径、指南和保障功能，不以精神力量为主定位。","quickMethod":"问精神直接找文化。"},"chapter-1-q006":{"keywords":"进入新时代、重大判断、基本依据","whyCorrect":"社会主要矛盾变化集中反映我国发展阶段和需求供给变化，是作出新时代判断的基本依据。","distractorTrap":"奋斗目标、国际环境、历史起点都是背景或结果，不能替代判断历史方位的基本社会依据。","quickMethod":"历史方位判断先看社 A、B、C。","distractorTrap":"四大考验风险说明必要性，不是“能够勇于”的内在原因。","quickMethod":"敢自我革命因无私、有信、志远。"},"chapter-17-q032":{"keywords":"三个务必","whyCorrect":"不忘初心使命、谦虚谨慎艰苦奋斗、敢于善于斗争，A、B、D。","distractorTrap":"解放思想实事求是是思想路线，不在三个务必。","quickMethod":"三个务必“初心、谦苦、斗争”。"},"chapter-17-q033":{"keywords":"从严治党体系四标准","whyCorrect":"布局合理、内容科学、要素齐备、统一高效，四项全选。","distractorTrap":"四项从结构内容要素运行完整评价。","quickMethod":"体系四标准全选。"},"chapter-17-q034":{"keywords":"政治能力三力","whyCorrect":"政治判断力、领悟力、执行力，B、C、D。","distractorTrap":"观察力被规范的“判断力”取代。","quickMethod":"先判断、再领悟、后执行。"},"chapter-17-q035":{"keywords":"监督体系三要求","whyCorrect":"党统一领导、全面覆盖、权威高效，A、B、D。","distractorTrap":"运行有序不是固定三项。","quickMethod":"监督三词与法治监督同构：党领、全盖、权威高效。"},"chapter-17-q036":{"keywords":"反腐制度法治三表现","whyCorrect":"党领导格局、虎蝇狐齐打、权进制度笼，A、B、C。","distractorTrap":"理想教育重要但不是反腐“根本举措”的准确定位。","quickMethod":"反腐实践看领导、惩治、制度约束。"},"chapter-17-q037":{"keywords":"自我革命四自","whyCorrect":"自我净化、完善、革新、提高，四项全选。","distractorTrap":"四个动作完整构成自我革命目标。","quickMethod":"四自“净完革提”。"},"chapter-17-q038":{"keywords":"四大考验补全","whyCorrect":"改革开放、市场经济、外部环境，加执政考验，B、C、D。","distractorTrap":"经济全球化不是固定考验名称。","quickMethod":"四考验“执、改、市、外”。"},"chapter-17-q039":{"keywords":"全面从严四全","whyCorrect":"内容全涵盖、对象全覆盖、责任全链条、制度全贯通，四项全选。","distractorTrap":"四项分别回答管什么、管谁、谁负责、靠何机制。","quickMethod":"四全完整选。"},"chapter-17-q040":{"keywords":"新时代党建两条主线","whyCorrect":"长期执政能力建设、先进性和纯洁性建设，B、C。","distractorTrap":"制度反腐建设是具体领域，不是主线两项。","quickMethod":"党建主线一能力、一品质。"},"chapter-17-q041":{"keywords":"周期率第一个答案","whyCorrect":"第一个答案是让人民监督政府，第二个是自我革命，判对。","distractorTrap":"主体措辞按课程固定表述成立。","quickMethod":"第一外部人民监督，第二内部自我革命。"},"chapter-17-q042":{"keywords":"反腐倡廉核心","whyCorrect":"制度制约和监督权力抓住腐败产生的权力条件，判对。","distractorTrap":"教育解决不想腐，但核心权力制约仍不可替代。","quickMethod":"腐败围绕权力，核心就管权监督。"},"chapter-17-q043":{"keywords":"党内政治生活首要任务","whyCorrect":"加强思想教育和理论武装统一思想，是首要任务和步调一致前提，判对。","distractorTrap":"与政治建设首要任务不同：前者问党内政治生活，后者问政治建设。","quickMethod":"场景变则答案变，政治生活先理论武装。"},"chapter-17-q044":{"keywords":"全面从严主体责任谁负","whyCorrect":"各级党委党组负主体责任，纪委负监督责任；题干让纪委负主体，判错。","distractorTrap":"纪委是专责监督机关，责任重要但类型不同。","quickMethod":"党委主体、纪委监督。"},"chapter-17-q045":{"keywords":"执政党最大威胁","whyCorrect":"腐败是党面临的最大威胁，不是能力不足，判错。","distractorTrap":"能力不足是四大危险之一，但层级低于最大威胁。","quickMethod":"最大危险脱离群众，最大威胁腐败。"},"chapter-17-q046":{"keywords":"党生存发展第一位问题","whyCorrect":"政治方向是第一位问题，题干换成政治立场，判错。","distractorTrap":"立场同样重要且与方向紧密，正是近义固定搭配陷阱。","quickMethod":"“第一位问题”后固定政治方向。"},"chapter-17-q047":{"keywords":"新时代组织路线首要","whyCorrect":"首要是坚持和加强党中央集中统一领导，严密组织体系是重要任务；题干错位，判错。","distractorTrap":"组织体系内容正确，但不能占首要政治原则。","quickMethod":"组织路线先听中央，再建体系。"},"chapter-17-q048":{"keywords":"社会革命要求自我革命","whyCorrect":"外部社会革命越艰巨，执政党越需高标准自我革命，逻辑成立，判对。","distractorTrap":"两种革命不是相互替代，而是引领关系。","quickMethod":"打铁必须自身硬，判断对。"},"chapter-17-q049":{"keywords":"永葆活力赶考必由之路","whyCorrect":"全面从严治党或自我革命是必由之路，题干缩为反腐败斗争单项，判错。","distractorTrap":"反腐是自我革命重要内容，但不能替代整个必由之路。","quickMethod":"具体一战不能顶替整体自我革命。"},"chapter-17-q050":{"keywords":"作风问题核心","whyCorrect":"作风反映党同人民群众关系，核心正是党群关系，判对。","distractorTrap":"不是单纯干部个人生活习惯问题。","quickMethod":"作风好坏群众最有感，核心党群关系。"}}}</script><script>
const DB=JSON.parse(document.getElementById('bank').textContent), KEY='zhihuishu-study-'+DB.version;
const fresh=()=>({schema:1,bankVersion:DB.version,stats:{},wrong:{},favorites:[],attempts:[],exams:[],settings:{shuffleOptions:true},sessions:{},session:null});
const sessionKey=s=>s?.mode==='memorize'?'memorize':s?.mode==='exam'?'exam':s?.mode==='wrong'?'wrong':s?.mode==='favorites'?'favorites':'practice';
const sessionName=k=>({memorize:'背记',practice:'练习',exam:'模拟考试',wrong:'错题专项练习',favorites:'收藏专项练习'})[k]||'练习';
let S=load(),view='home',session=null,selected=new Set(),answered=false;
function load(){try{const x=JSON.parse(localStorage.getItem(KEY));if(!x||x.bankVersion!==DB.version)return fresh();const state=Object.assign(fresh(),x);if(x.session?.ids?.length&&!state.sessions?.[sessionKey(x.session)]){state.sessions??={};state.sessions[sessionKey(x.session)]=x.session}return state}catch{return fresh()}}
function save(){try{if(session?.ids?.length){S.sessions??={};S.sessions[sessionKey(session)]=session}S.session=session;localStorage.setItem(KEY,JSON.stringify(S))}catch{toast('本地保存失败，请立即导出学习数据')}}
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const shuffle=a=>{a=[...a];for(let i=a.length-1;i;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a};
const typeName=t=>({single:'单选题',multiple:'多选题',judgment:'判断题'}[t]);
function toast(x){const e=document.getElementById('toast');e.textContent=x;e.classList.remove('hidden');setTimeout(()=>e.classList.add('hidden'),2200)}
function stat(id){return S.stats[id]||(S.stats[id]={seen:0,correct:0,wrong:0,streak:0})}
function nav(){return [['home','总览','⌂'],['memorize','背记','▤'],['practice','练习','✎'],['exam','考试','◷'],['wrong','错题','!'],['favorites','收藏','★'],['stats','统计','▥']].map(([id,n,ic])=>`<button data-nav="${id}" class="${view===id?'active':''}">${ic} ${n}</button>`).join('')}
function shell(content,side=''){document.getElementById('app').innerHTML=`<div class="app"><aside class="rail"><div class="brand">新思想刷题册<small>854 题 · 18 章 · 离线版</small></div><nav class="nav">${nav()}</nav><div class="rail-foot">题库 ${esc(DB.version)}<br>数据仅保存在此浏览器</div></aside><main class="main">${content}</main><aside class="side">${side||sideDefault()}</aside></div><div class="mobile-data"><button class="btn" onclick="exportData()">导出学习数据</button><button class="btn" onclick="document.getElementById('importFile').click()">导入并覆盖</button></div><nav class="mobile-nav">${nav()}</nav>`;bindNav()}
function bindNav(){document.querySelectorAll('[data-nav]').forEach(b=>b.onclick=()=>go(b.dataset.nav))}
function sideDefault(){const done=Object.keys(S.stats).length;return `<h3>学习进度</h3><div class="side-stat">已遇见 ${done} / ${DB.questions.length}</div><div class="progress"><i style="width:${done/DB.questions.length*100}%"></i></div><h3 style="margin-top:24px">快捷操作</h3><button class="btn" onclick="exportData()">导出学习数据</button><button class="btn" style="margin-top:8px" onclick="document.getElementById('importFile').click()">导入并覆盖</button>`}
function discardSavedSession(key){if(S.sessions)delete S.sessions[key];if(S.session&&sessionKey(S.session)===key)S.session=null;save()}
function resumeSession(key){const saved=S.sessions?.[key];if(!saved?.ids?.length||!confirm(`发现未完成的${sessionName(key)}，是否继续上次进度？`))return false;session=saved;view=key;renderQuestion();return true}
function go(v){if(session){save();session=null}if(['memorize','practice','exam'].includes(v)&&S.sessions?.[v]?.ids?.length){if(resumeSession(v))return;discardSavedSession(v)}view=v;({home,memorize:()=>setup('memorize'),practice:()=>setup('practice'),exam:()=>startExam(),wrong:()=>listSpecial('wrong'),favorites:()=>listSpecial('favorites'),stats}[v]||home)()}
function header(title,sub,actions=''){return `<header class="top"><div><h1>${title}</h1><p>${sub}</p></div><div class="actions">${actions}</div></header>`}
function totals(){let a=0,c=0,w=0;Object.values(S.stats).forEach(x=>{a+=x.correct+x.wrong;c+=x.correct;w+=x.wrong});return {a,c,w,rate:a?Math.round(c/a*100):0}}
function home(){const t=totals(),seen=Object.keys(S.stats).length;const modes=[['memorize','背记模式','直接浏览题干、原选项、答案、网站解析和逐题判断技巧'],['practice','分章节练习','选择章节，支持顺序或随机题序'],['exam','模拟考试','随机抽取 100 道题，每题即时判分'],['wrong','错题本',`当前 ${Object.keys(S.wrong).length} 道，连续答对 3 次自动移出`],['favorites','收藏练习',`已收藏 ${S.favorites.length} 道题`],['stats','数据统计','查看章节、题型、单题与考试表现']];shell(`${header('学习总览','打开即学，所有进度自动保存在当前浏览器')}<div class="grid">${modes.map(x=>`<button class="mode" onclick="${x[0]==='favorites'?"listSpecial('favorites')":`go('${x[0]}')`}"><b>${x[1]}</b><span>${x[2]}</span></button>`).join('')}</div><div class="kpis"><div class="kpi"><strong>${seen}</strong><small>已遇见题目</small></div><div class="kpi"><strong>${t.a}</strong><small>累计作答</small></div><div class="kpi"><strong>${t.rate}%</strong><small>历史正确率</small></div><div class="kpi"><strong>${passEstimate()}</strong><small>预计通过率</small></div></div><h2 class="section-title">章节进度</h2><div class="chapter-list">${DB.chapters.map(c=>{const qs=DB.questions.filter(q=>q.chapterOrder===c.chapterOrder),d=qs.filter(q=>S.stats[q.id]).length;return `<div class="chapter-row"><span class="num">${String(c.chapterOrder).padStart(2,'0')}</span><div>${esc(c.chapterName)}<div class="progress"><i style="width:${d/qs.length*100}%"></i></div></div><span>${d}/${qs.length}</span></div>`}).join('')}</div>`)}
function passEstimate(){const t=totals(),coverage=Object.keys(S.stats).length/DB.questions.length;if(t.a<30||coverage<.1)return '样本不足';const practice=t.c/t.a, exams=S.exams.slice(-3);const examRate=exams.length?exams.reduce((a,e)=>a+e.score/e.total,0)/exams.length:practice;return Math.round((practice*.55+coverage*.15+examRate*.3)*100)+'%'}

function retryWrong(ids,mode,shuffleOptions){const qs=ids.split(',').map(id=>DB.questions.find(q=>q.id===id)).filter(Boolean);if(!qs.length)return toast('本轮没有可重练的错题');view=mode;startSession(mode,qs,{shuffle:shuffleOptions===1||shuffleOptions==='1'})}
finish=function(){const completed=session;if(!completed)return;const completedKey=sessionKey(completed),ids=completed.ids,results=completed.results,total=ids.length,answered=Object.keys(results).length,correct=Object.values(results).filter(r=>r.correct).length,wrongIds=ids.filter(id=>results[id]&&!results[id].correct),wrong=wrongIds.length,unanswered=total-answered;if(completed.mode==='exam')S.exams.push({at:new Date().toISOString(),score:completed.score,total,passed:completed.score>=Math.ceil(total*.6),results});session=null;if(S.sessions)delete S.sessions[completedKey];S.session=null;save();if(completed.mode==='memorize'){shell(`${header('背记完成',`已浏览 ${total} 道题`)}<div class="kpis"><div class="kpi"><strong>${total}</strong><small>已浏览题目</small></div><div class="kpi"><strong>${Object.keys(S.stats).length}</strong><small>累计已练题</small></div></div><div class="toolbar"><button class="btn primary" onclick="go('memorize')">继续背记</button><button class="btn" onclick="home()">返回总览</button></div>`);return}const accuracy=answered?Math.round(correct/answered*100)+'%':'—',title=completed.mode==='exam'?'考试总结':`${sessionName(completedKey)}总结`,subtitle=wrong?`本轮答错 ${wrong} 道，可立即专项重练`:'本轮没有错题',retry=wrong?`<button class="btn primary" onclick="retryWrong('${wrongIds.join(',')}','${completed.mode}',${completed.shuffle?1:0})">错题重练（${wrong}）</button>`:'',examAgain=completed.mode==='exam'?'<button class="btn" onclick="go(\'exam\')">再考一次</button>':'';shell(`${header(title,subtitle)}<div class="kpis"><div class="kpi"><strong>${correct}</strong><small>答对</small></div><div class="kpi"><strong>${accuracy}</strong><small>正确率</small></div><div class="kpi"><strong>${wrong}</strong><small>答错</small></div><div class="kpi"><strong>${unanswered}</strong><small>未作答</small></div></div><h2 class="section-title">题型表现</h2><table class="table"><tbody>${perf(ids,results,'type')}</tbody></table><h2 class="section-title">章节表现</h2><table class="table"><tbody>${perf(ids,results,'chapter')}</tbody></table><div class="toolbar">${retry}${examAgain}<button class="btn" onclick="home()">返回总览</button></div>`)};
const renderHome=home;
home=function(){view='home';renderHome()};
const renderQuestionBase=renderQuestion;
renderQuestion=function(restoreSideScroll){renderQuestionBase(restoreSideScroll);const q=current(),s=S.stats?.[q.id]||{seen:0,correct:0,wrong:0},attempts=s.correct+s.wrong,seen=Number.isFinite(s.seen)?s.seen:attempts,rate=attempts?Math.round(s.correct/attempts*100)+'%':'—';document.querySelector('.favorite')?.insertAdjacentHTML('afterend',`<span class="attempt-summary">已遇见本题 ${seen} 次 · 答对 ${s.correct} 次 · 答错 ${s.wrong} 次 · 正确率 ${rate}</span>`);document.querySelector('.side')?.insertAdjacentHTML('beforeend','<button class="btn primary session-submit" onclick="finish()">提交并查看总结</button>');document.querySelector('.question')?.insertAdjacentHTML('beforeend','<div class="toolbar mobile-submit"><button class="btn primary" onclick="finish()">提交并查看总结</button></div>')};
const renderStats=stats;
stats=function(sort='number-asc',chapter='all'){renderStats(sort);const table=[...document.querySelectorAll('.table')].find(t=>t.querySelector('th')?.textContent==='题号');if(!table)return;const sortSelect=document.getElementById('detailSort');if(sortSelect){sortSelect.onchange=()=>stats(sortSelect.value,chapter);sortSelect.insertAdjacentHTML('afterend',`<label for="detailChapter">章节筛选</label><select id="detailChapter"><option value="all">全部章节</option>${DB.chapters.map(c=>`<option value="${c.chapterOrder}">${esc(c.chapterName)}</option>`).join('')}</select>`);const chapterSelect=document.getElementById('detailChapter');chapterSelect.value=chapter;chapterSelect.onchange=()=>stats(sortSelect.value,chapterSelect.value)}[...table.tBodies[0].rows].forEach(row=>{const [chapterOrder,number]=row.cells[0].textContent.split('-').map(Number),q=DB.questions.find(x=>x.chapterOrder===chapterOrder&&x.number===number);row.hidden=chapter!=='all'&&String(chapterOrder)!==String(chapter);if(!q)return;const options=q.options.map(o=>`<div class="stat-option ${q.correctOptionIds.includes(o.id)?'correct':''}"><b>${esc(o.sourceLabel)}.</b>${esc(o.text)}</div>`).join('');row.cells[1].insertAdjacentHTML('beforeend',`<div class="stat-options">${options}</div>`)})}
function exportData(){const out={schema:1,bankVersion:DB.version,exportedAt:new Date().toISOString(),learningData:S};const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(out,null,2)],{type:'application/json'}));a.download='新思想刷题册-学习数据-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(a.href)}
document.getElementById('importFile').onchange=async e=>{const f=e.target.files[0];if(!f)return;try{const x=JSON.parse(await f.text());if(x.schema!==1||x.bankVersion!==DB.version||!x.learningData)throw Error('文件格式或题库版本不匹配');if(!confirm(`将覆盖当前数据。导入文件包含 ${Object.keys(x.learningData.stats||{}).length} 道已练题，是否继续？`))return;S=x.learningData;S.bankVersion=DB.version;save();toast('导入完成');home()}catch(err){alert('导入失败：'+err.message)}finally{e.target.value=''}};
function setupExam(){const max=DB.questions.length,def=Math.min(100,max),types=[['single','单选题'],['multiple','多选题'],['judgment','判断题']],available=Object.fromEntries(types.map(([type])=>[type,DB.questions.filter(q=>q.type===type).length]));shell(`${header('模拟考试设置',`共 ${max} 道题，本次题目和选项均会随机排列`, '<button class="btn" onclick="home()">返回总览</button>')}<div class="setup"><div class="field"><label>组卷方式</label><div class="chips"><button class="chip on" type="button" data-exam-mode="total">随机总题数</button><button class="chip" type="button" data-exam-mode="type">按题型配比</button></div></div><div class="field" id="examTotalField"><label for="examCount">本次题目数量</label><input id="examCount" type="number" min="1" max="${max}" value="${def}" inputmode="numeric" style="width:150px;padding:9px 10px;border:1px solid var(--line);border-radius:6px;background:white"><p style="color:var(--muted);font-size:13px;margin:8px 0 0">可选 1-${max} 道；开始后每题即时判分。</p></div><div class="field" id="examTypeFields" hidden><label>各题型数量</label><div style="display:grid;grid-template-columns:repeat(3,minmax(110px,1fr));gap:10px;max-width:500px">${types.map(([type,name])=>`<label style="display:block;font-size:13px;color:var(--muted)">${name}（最多 ${available[type]}）<input class="exam-type-count" data-type="${type}" type="number" min="0" max="${available[type]}" value="0" inputmode="numeric" style="box-sizing:border-box;width:100%;margin-top:5px;padding:9px 10px;border:1px solid var(--line);border-radius:6px;background:white;color:var(--ink)"></label>`).join('')}</div><p id="examTypeTotal" style="color:var(--muted);font-size:13px;margin:8px 0 0">本次共 0 道题</p></div><button id="startExam" class="btn primary">开始考试</button></div>`);let mode='total';const totalField=document.getElementById('examTotalField'),typeFields=document.getElementById('examTypeFields'),typeInputs=[...document.querySelectorAll('.exam-type-count')],typeTotal=document.getElementById('examTypeTotal'),updateTypeTotal=()=>{const total=typeInputs.reduce((sum,input)=>sum+(Number(input.value)||0),0);typeTotal.textContent=`本次共 ${total} 道题`};document.querySelectorAll('[data-exam-mode]').forEach(button=>button.onclick=()=>{mode=button.dataset.examMode;document.querySelectorAll('[data-exam-mode]').forEach(x=>x.classList.toggle('on',x===button));totalField.hidden=mode!=='total';typeFields.hidden=mode!=='type'});typeInputs.forEach(input=>input.oninput=updateTypeTotal);document.getElementById('startExam').onclick=()=>{if(mode==='total'){const count=Number(document.getElementById('examCount').value);if(!Number.isInteger(count)||count<1||count>max)return toast(`请输入 1-${max} 之间的整数`);return startExam(count)}const counts={};for(const input of typeInputs){const count=Number(input.value);if(!Number.isInteger(count)||count<0||count>available[input.dataset.type])return toast(`请输入 0-${available[input.dataset.type]} 之间的整数`);counts[input.dataset.type]=count}const total=Object.values(counts).reduce((sum,count)=>sum+count,0);if(!total)return toast('请至少选择 1 道题');startExam(counts)}}
startExam=function(spec){if(Number.isInteger(spec))return startSession('exam',shuffle(DB.questions).slice(0,spec),{shuffle:true});if(spec&&typeof spec==='object'){const qs=shuffle(Object.entries(spec).flatMap(([type,count])=>shuffle(DB.questions.filter(q=>q.type===type)).slice(0,count)));return startSession('exam',qs,{shuffle:true})}setupExam()};
const renderStatsWithExamSummary=stats;
stats=function(sort='number-asc',chapter='all'){renderStatsWithExamSummary(sort,chapter);const titles=[...document.querySelectorAll('.section-title')],detailTitle=titles.find(title=>title.textContent==='逐题表现'),examTitle=titles.find(title=>title.textContent==='模拟考试');if(!detailTitle||!examTitle)return;const oldExamContent=examTitle.nextElementSibling;examTitle.remove();oldExamContent?.remove();const rows=[...S.exams].reverse().map(exam=>`<tr><td>${exam.total}</td><td>${exam.score}</td></tr>`).join(''),content=rows?`<div class="table-wrap"><table class="table"><thead><tr><th>总分</th><th>得分</th></tr></thead><tbody>${rows}</tbody></table></div>`:'<div class="empty">还没有考试记录</div>';detailTitle.insertAdjacentHTML('beforebegin',`<h2 class="section-title">模拟考试</h2>${content}`)};
const renderHomeWithExamModes=home;
home=function(){renderHomeWithExamModes();const examCard=[...document.querySelectorAll('.mode')].find(card=>card.textContent.includes('模拟考试'));examCard?.querySelector('span')&&(examCard.querySelector('span').textContent='自定题量或按题型配比随机组卷')};

const renderStatsWithExamColumns=stats;
stats=function(sort='number-asc',chapter='all'){renderStatsWithExamColumns(sort,chapter);const examTitle=[...document.querySelectorAll('.section-title')].find(title=>title.textContent==='模拟考试'),table=examTitle?.nextElementSibling?.querySelector('table');if(!table)return;const rows=[...S.exams].reverse().map((exam,index)=>{const rate=exam.total?Math.round(exam.score/exam.total*100)+'%':'—';return `<tr><td>${index+1}</td><td>${exam.total}</td><td>${exam.score}</td><td>${rate}</td></tr>`}).join('');table.innerHTML=`<thead><tr><th>序号</th><th>总分</th><th>得分</th><th>正确率</th></tr></thead><tbody>${rows}</tbody>`};

const startExamWithOriginalOrder=startExam;
startExam=function(spec){if(spec&&typeof spec==='object'&&!Array.isArray(spec)){const types=['single','multiple','judgment'],qs=types.flatMap(type=>shuffle(DB.questions.filter(q=>q.type===type)).slice(0,Number(spec[type])||0));return startSession('exam',qs,{shuffle:true})}return startExamWithOriginalOrder(spec)};
